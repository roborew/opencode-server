services:
  opencode:
    build:
      context: .
      args:
        CONFIG_REPO: ${CONFIG_REPO:-https://github.com/roborew/opencode.git}
        CONFIG_REF: ${CONFIG_REF:-main}
    container_name: opencode-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OPENCODE_CONFIG_DIR: /root/.config/opencode
      OPENCODE_OVERRIDE: /root/overrides/opencode.server.json
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      MILVUS_ADDRESS: http://milvus-standalone:19530
      MILVUS_TOKEN: ${MILVUS_TOKEN:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-OpenAI}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GH_ORG: ${GH_ORG:-}
      GH_PROJECT: ${GH_PROJECT:-}
      GH_TOKEN: ${GH_TOKEN:-}
      CODERABBIT_API_KEY: ${CODERABBIT_API_KEY:-}
      DOCS_MCP_URL: ${DOCS_MCP_URL:-http://host.docker.internal:6280/sse}
      DOCKER_HOST_INTERNAL: ${DOCKER_HOST_INTERNAL:-host.docker.internal}
      LOCALHOST_REWRITE: ${LOCALHOST_REWRITE:-1}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
      INFISICAL_ENV: ${INFISICAL_ENV:-dev}
      INFISICAL_DOMAIN: ${INFISICAL_DOMAIN:-}
      INFISICAL_API_URL: ${INFISICAL_API_URL:-}
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID:-}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET:-}
      INFISICAL_TOKEN: ${INFISICAL_TOKEN:-}
      INFISICAL_USE_CLI: ${INFISICAL_USE_CLI:-true}
      OPENCODE_APPS_DIR: ${OPENCODE_APPS_DIR:-${HOME}/projects}
      OPENCODE_WORKTREES_DIR: ${OPENCODE_WORKTREES_DIR:-${HOME}/.local/share/opencode/worktree}
      # Git identity for agent commits inside the container
      GIT_USER_NAME: ${GIT_USER_NAME:-}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-}
      GIT_COMMITTER_NAME: ${GIT_COMMITTER_NAME:-}
      GIT_COMMITTER_EMAIL: ${GIT_COMMITTER_EMAIL:-}
      # Required for Desktop workspace create/delete (otherwise API times out
      # waiting for workspace.status after 5s — see anomalyco/opencode#23746).
      OPENCODE_EXPERIMENTAL_WORKSPACES: ${OPENCODE_EXPERIMENTAL_WORKSPACES:-true}
      # Must match entrypoint: docker exec (setup mcp auth) inherits this so tokens
      # land in the same store as `opencode serve` (volume via /var/opencode-xdg).
      XDG_DATA_HOME: /var/opencode-xdg
      OPENCODE_CONTAINER_XDG: /var/opencode-xdg
    volumes:
      # Sessions/auth/db on named volume; entrypoint links into /var/opencode-xdg/opencode
      # (container XDG — isolated from Desktop ~/.local/share).
      # Worktrees: host dir → container create path + same-path for local Git.
      # Apps: /workspace/apps (legacy project registrations) + same-path host bind.
      - opencode-data:/var/lib/opencode-data
      - ${OPENCODE_WORKTREES_DIR:-${HOME}/.local/share/opencode/worktree}:/var/opencode-xdg/opencode/worktree:delegated
      - ${OPENCODE_WORKTREES_DIR:-${HOME}/.local/share/opencode/worktree}:${OPENCODE_WORKTREES_DIR:-${HOME}/.local/share/opencode/worktree}:delegated
      - ${OPENCODE_APPS_DIR:-${HOME}/projects}:/workspace/apps:delegated
      - ${OPENCODE_APPS_DIR:-${HOME}/projects}:${OPENCODE_APPS_DIR:-${HOME}/projects}:delegated
      # Optional: only mount the host SSH agent socket when set. Empty
      # SSH_AUTH_SOCK skips the bind entirely (container uses GH_TOKEN for git).
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
    working_dir: /workspace/apps
    depends_on:
      milvus-standalone:
        condition: service_healthy
        # Allow `COMPOSE_PROFILES=` (no milvus) for a lighter stack when not indexing.
        required: false
    ports:
      # Host + container port 4097 — avoids Kilo/other tools on 4096
      - "${OPENCODE_PUBLISH_PORT:-4097}:4097"
      # MCP OAuth callback (OpenCode listens on container loopback; entrypoint
      # socat bridges eth0→127.0.0.1). Default bind is loopback-only so DO
      # droplets are not exposed publicly — use SSH -L from a laptop browser.
      - "${OPENCODE_OAUTH_CALLBACK_PUBLISH:-127.0.0.1:19876}:19876"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      opencode-net:
        aliases:
          # FQDN for Twingate resource (override via OPENCODE_FQDN)
          - ${OPENCODE_FQDN:-opencode.local}

  twingate-connector:
    image: twingate/connector:1
    container_name: twingate-connector
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TWINGATE_NETWORK: ${TWINGATE_NETWORK}
      TWINGATE_ACCESS_TOKEN: ${TWINGATE_ACCESS_TOKEN}
      TWINGATE_REFRESH_TOKEN: ${TWINGATE_REFRESH_TOKEN}
      TWINGATE_LABEL_HOSTNAME: opencode-connector
      TWINGATE_LOG_ANALYTICS: v2
      TWINGATE_LOG_LEVEL: "3"
      # Do NOT set TWINGATE_DNS to 1.1.1.1/8.8.8.8 — that bypasses Docker
      # embedded DNS and breaks resolving OPENCODE_FQDN / service names.
    sysctls:
      net.ipv4.ping_group_range: "0 2147483647"
    networks:
      - opencode-net

  etcd:
    profiles: ["milvus"]
    container_name: milvus-etcd
    restart: unless-stopped
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - opencode-net

  minio:
    profiles: ["milvus"]
    container_name: milvus-minio
    restart: unless-stopped
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "${MINIO_API_PUBLISH_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PUBLISH_PORT:-19001}:9001"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - opencode-net

  milvus-standalone:
    profiles: ["milvus"]
    container_name: milvus-standalone
    restart: unless-stopped
    image: milvusdb/milvus:v2.6.12
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "${MILVUS_PUBLISH_PORT:-19530}:19530"
      - "${MILVUS_HEALTH_PUBLISH_PORT:-9091}:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - opencode-net

volumes:
  opencode-data:

networks:
  opencode-net:
    driver: bridge
